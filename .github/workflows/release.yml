name: Build and Release WordPress Plugin

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(grep -m1 -E '^[[:space:]]*\* Version:' wordpress-email.php | sed -E 's/^[[:space:]]*\* Version:[[:space:]]*//')
          if [[ -z "${VERSION}" ]]; then
            echo "Version konnte aus wordpress-email.php nicht gelesen werden." >&2
            exit 1
          fi

          TAG="v${VERSION}-${GITHUB_RUN_NUMBER}"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Build plugin zip
        shell: bash
        run: |
          set -euo pipefail

          PLUGIN_SLUG="wordpress_email"
          BUILD_DIR="dist"
          PACKAGE_DIR="${BUILD_DIR}/${PLUGIN_SLUG}"
          ZIP_NAME="${PLUGIN_SLUG}-${TAG}.zip"

          rm -rf "${BUILD_DIR}"
          mkdir -p "${PACKAGE_DIR}"

          rsync -av ./ "${PACKAGE_DIR}/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist'

          (
            cd "${BUILD_DIR}"
            zip -r "${ZIP_NAME}" "${PLUGIN_SLUG}"
          )

          echo "ZIP_PATH=${BUILD_DIR}/${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create Git tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: WordPress Email Connector ${{ env.TAG }}
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
